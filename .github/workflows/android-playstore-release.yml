name: Android Play Store Release

on:
  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  build-and-deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, 'bundle-deploy')

    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      # Cache Yarn Berry
      - name: Cache Yarn Berry
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
            node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      # Debug (optional)
      - name: Debug Yarn Config
        run: |
          yarn -v
          cat .yarnrc.yml || true
          ls -la patches || true

      # Install dependencies
      - name: Install dependencies
        run: yarn install --immutable

      # Setup Java
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # Setup Gradle with cache
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      # Decode Android Keystore
      - name: Decode Android Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      # Create keystore.properties
      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties <<EOF
          MYAPP_UPLOAD_STORE_FILE=release.keystore
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      # Create google-services.json
      - name: Create google-services.json
        run: |
          echo "${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      # Verify generated files (optional)
      - name: Verify files
        run: |
          ls -la android
          ls -la android/app
          test -f android/app/release.keystore
          test -f android/app/google-services.json

      # Build Signed AAB
      - name: Build Release AAB
        run: |
          VERSION_CODE=$((GITHUB_RUN_NUMBER * 100 + GITHUB_RUN_ATTEMPT))

          cd android

          ./gradlew bundleRelease \
            -PhermesEnabled=true \
            -PVERSION_CODE=$VERSION_CODE \
            --parallel \
            --build-cache \
            --configuration-cache \
            --daemon \
            -x test \
            -x lint

      # Upload generated AAB as artifact
      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      # Upload to Play Store
      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
          packageName: com.rupeeflow
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          tracks: production
          status: completed