name: Android Play Store Release

on:
  workflow_dispatch:
    inputs:
      upload_mode:
        description: "Choose upload mode"
        required: true
        default: "build"
        type: choice
        options:
          - build
          - artifact

      artifact_name:
        description: "Artifact name (only for artifact mode)"
        required: false
        default: "app-release-aab"

      track:
        description: "Google Play Track"
        required: true
        default: "internal"
        type: choice
        options:
          - internal
          - closed
          - production

  push:
    branches:
      - main

jobs:
  build-and-deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, 'bundle-deploy')

    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read

    env:
      CI: true

    steps:
      - uses: actions/checkout@v4

      #########################################################
      # Build mode only
      #########################################################

      - name: Setup Node.js
        if: github.event.inputs.upload_mode != 'artifact'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Cache Yarn Berry
        if: github.event.inputs.upload_mode != 'artifact'
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}

      - name: Install dependencies
        if: github.event.inputs.upload_mode != 'artifact'
        run: yarn install --immutable

      - name: Setup Java
        if: github.event.inputs.upload_mode != 'artifact'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        if: github.event.inputs.upload_mode != 'artifact'
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Android Keystore
        if: github.event.inputs.upload_mode != 'artifact'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" \
            | base64 --decode > android/app/release.keystore

      - name: Create keystore.properties
        if: github.event.inputs.upload_mode != 'artifact'
        run: |
          cat > android/keystore.properties <<EOF
          MYAPP_UPLOAD_STORE_FILE=release.keystore
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Create google-services.json
        if: github.event.inputs.upload_mode != 'artifact'
        run: |
          echo "${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}" \
            | base64 --decode > android/app/google-services.json

      - name: Build Release AAB
        if: github.event.inputs.upload_mode != 'artifact'
        run: |
          VERSION_CODE=$((GITHUB_RUN_NUMBER * 100 + GITHUB_RUN_ATTEMPT))

          cd android

          ./gradlew bundleRelease \
            -PhermesEnabled=true \
            -PVERSION_CODE=$VERSION_CODE \
            --parallel \
            --build-cache \
            --configuration-cache \
            --daemon \
            -x test \
            -x lint

      - name: Upload Build Artifact
        if: github.event.inputs.upload_mode != 'artifact'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      #########################################################
      # Artifact mode
      #########################################################

      - name: Download Existing Artifact
        if: github.event.inputs.upload_mode == 'artifact'
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.inputs.artifact_name }}
          path: artifact

      #########################################################
      # Fastlane Upload
      #########################################################

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      - name: Create Play Service Account JSON
        run: |
          echo '${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}' \
            > play-service-account.json

      - name: Upload to Google Play via Fastlane
        run: |
          if [ "${{ github.event.inputs.upload_mode }}" = "artifact" ]; then
            AAB_PATH=$(find artifact -name "*.aab" | head -n 1)
          else
            AAB_PATH="android/app/build/outputs/bundle/release/app-release.aab"
          fi

          fastlane supply \
            --aab "$AAB_PATH" \
            --json_key play-service-account.json \
            --package_name com.rupeeflow \
            --track ${{ github.event.inputs.track || 'internal' }} \
            --skip_upload_metadata true \
            --skip_upload_images true \
            --skip_upload_screenshots true \
            --skip_upload_changelogs true