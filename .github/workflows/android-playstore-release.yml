name: Android Play Store Release

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Google Play Track"
        required: true
        default: "internal"
        type: choice
        options:
          - internal
          - closed
          - production

  push:
    branches:
      - main

jobs:
  build:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, 'bundle-deploy')

    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      CI: true

    outputs:
      version_code: ${{ steps.version.outputs.version_code }}

    steps:
      ######################################################################
      # Checkout
      ######################################################################
      - name: Checkout repository
        uses: actions/checkout@v4

      ######################################################################
      # Node Setup
      ######################################################################
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn

      ######################################################################
      # Cache Yarn Berry
      ######################################################################
      - name: Cache Yarn Berry
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      ######################################################################
      # Install Dependencies
      ######################################################################
      - name: Install dependencies
        run: yarn install --immutable

      ######################################################################
      # Setup Java
      ######################################################################
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      ######################################################################
      # Cache Android SDK (reuse existing cache)
      ######################################################################
      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/cmake
            /usr/local/lib/android/sdk/ndk
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('android/build.gradle', 'android/app/build.gradle', 'android/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-

      ######################################################################
      # Cache Native Build Artifacts (reuse existing cache)
      ######################################################################
      - name: Cache Native Build Artifacts
        uses: actions/cache@v4
        with:
          path: |
            android/.cxx
            android/app/.cxx
          key: ${{ runner.os }}-cxx-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties', 'yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-cxx-

      ######################################################################
      # Setup Gradle
      ######################################################################
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      ######################################################################
      # Decode Android Keystore
      ######################################################################
      - name: Decode Android Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" \
            | base64 --decode > android/app/release.keystore

      ######################################################################
      # Create keystore.properties
      ######################################################################
      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties <<EOF
          MYAPP_UPLOAD_STORE_FILE=release.keystore
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      ######################################################################
      # Create google-services.json
      ######################################################################
      - name: Create google-services.json
        run: |
          echo "${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}" \
            | base64 --decode > android/app/google-services.json

      ######################################################################
      # Generate Version Code
      ######################################################################
      - name: Generate Version Code
        id: version
        run: |
          VERSION_CODE=$(date +%s)
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Generated Version Code: $VERSION_CODE"

      ######################################################################
      # Build Release AAB
      ######################################################################
      - name: Build Release AAB
        run: |
          cd android

          ./gradlew bundleRelease \
            -PhermesEnabled=true \
            -PVERSION_CODE=${{ steps.version.outputs.version_code }} \
            --parallel \
            --build-cache \
            --configuration-cache \
            --configuration-cache-problems=warn \
            --daemon \
            -x test \
            -x lint

      ######################################################################
      # Upload Build Artifact
      ######################################################################
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7

      ######################################################################
      # Cleanup
      ######################################################################
      - name: Cleanup
        if: always()
        run: |
          rm -f android/app/release.keystore
          rm -f android/keystore.properties

  deploy:
    needs: build

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      ######################################################################
      # Download Artifact
      ######################################################################
      - name: Download AAB Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-aab
          path: artifact

      ######################################################################
      # Setup Ruby
      ######################################################################
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Fastlane
        run: gem install fastlane

      ######################################################################
      # Create Service Account JSON
      ######################################################################
      - name: Create Play Service Account JSON
        run: |
          echo '${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}' \
            > play-service-account.json

      ######################################################################
      # Upload to Google Play
      ######################################################################
      - name: Upload to Google Play
        continue-on-error: true
        run: |
          TRACK="${{ github.event.inputs.track }}"

          if [ -z "$TRACK" ]; then
            TRACK="internal"
          fi

          fastlane supply \
            --aab artifact/app-release.aab \
            --json_key play-service-account.json \
            --package_name com.rupeeflow \
            --track "$TRACK" \
            --skip_upload_metadata true \
            --skip_upload_images true \
            --skip_upload_screenshots true \
            --skip_upload_changelogs true

      ######################################################################
      # Cleanup
      ######################################################################
      - name: Cleanup
        if: always()
        run: rm -f play-service-account.json