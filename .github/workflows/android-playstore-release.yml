name: Android Play Store Release

on:
  # Manual trigger from Actions tab
  workflow_dispatch:

  # Trigger on pushes to main
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    # Run if:
    # 1. Triggered manually OR
    # 2. Push to main contains 'bundle-deploy' in commit message
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, 'bundle-deploy')

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node + cache Yarn dependencies
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.3.0"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      # Setup Java
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # Setup Gradle cache + configuration cache
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Decode Android Keystore
      - name: Decode Android Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      # Build Signed AAB
      - name: Build Release AAB
        run: |
          VERSION_CODE=$((GITHUB_RUN_NUMBER * 100 + GITHUB_RUN_ATTEMPT))

          cd android

          ./gradlew bundleRelease \
            --build-cache \
            --configuration-cache \
            -PVERSION_CODE=$VERSION_CODE \
            -Pandroid.injected.signing.store.file=app/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      # Upload AAB as artifact
      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      # Upload to Play Store
      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
          packageName: com.rupeeflow
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: production
          status: completed