<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy - RupeeFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --color-bg: #f5f4f0;
            --color-surface: #ffffff;
            --color-surface-2: #f9f8f5;
            --color-border: rgba(0, 0, 0, 0.1);
            --color-border-hover: rgba(0, 0, 0, 0.18);
            --color-text-primary: #1a1a18;
            --color-text-secondary: #5a5956;
            --color-text-muted: #9a9894;
            --color-brand: #f4bb5a;
            --color-brand-light: #fff5e6;
            --color-brand-text: #7a4d00;
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-bg: #1a1a18;
                --color-surface: #242422;
                --color-surface-2: #2c2c2a;
                --color-border: rgba(255, 255, 255, 0.1);
                --color-border-hover: rgba(255, 255, 255, 0.18);
                --color-text-primary: #f0efe8;
                --color-text-secondary: #a8a5a0;
                --color-text-muted: #6a6864;
                --color-brand-light: #2a1f00;
                --color-brand-text: #f4bb5a;
            }
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--color-bg);
            color: var(--color-text-primary);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
        }

        /* Hero */
        .pp-hero {
            background: #f4bb5a;
            padding: 2.5rem 2rem 3rem;
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-lg);
            margin-bottom: 1.5rem;
        }

        .pp-hero::before {
            content: '';
            position: absolute;
            right: -40px;
            top: -40px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
        }

        .pp-hero::after {
            content: '';
            position: absolute;
            right: 50px;
            bottom: -70px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
        }

        .pp-hero-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: 0.5rem;
        }

        .pp-hero-title {
            font-family: 'Fraunces', serif;
            font-size: 38px;
            font-weight: 300;
            color: #fff;
            margin: 0 0 0.5rem;
            line-height: 1.15;
        }

        .pp-hero-title em {
            font-style: italic;
        }

        .pp-hero-date {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 1rem;
        }

        .pp-hero-contact {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 0.75rem;
            font-size: 13px;
            color: #fff;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 16px;
            border-radius: 100px;
            text-decoration: none;
            transition: background 0.15s;
        }

        .pp-hero-contact:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* TOC */
        .pp-toc {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            border: 0.5px solid var(--color-border);
        }

        .pp-toc-heading {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-text-muted);
            margin-bottom: 0.75rem;
        }

        .pp-toc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 16px;
        }

        .pp-toc-item {
            font-size: 13px;
            color: var(--color-brand);
            cursor: pointer;
            padding: 4px 0;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .pp-toc-item:hover {
            text-decoration: underline;
        }

        .pp-toc-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--color-brand);
            flex-shrink: 0;
        }

        /* Accordion */
        .pp-section {
            border: 0.5px solid var(--color-border);
            border-radius: var(--radius-lg);
            margin-bottom: 0.75rem;
            overflow: hidden;
            background: var(--color-surface);
            transition: border-color 0.15s;
        }

        .pp-section:hover {
            border-color: var(--color-border-hover);
        }

        .pp-section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 1rem 1.25rem;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }

        .pp-section-header:hover {
            background: var(--color-surface-2);
        }

        .pp-icon {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-md);
            background: var(--color-brand-light);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .pp-icon i {
            font-size: 17px;
            color: var(--color-brand);
        }

        .pp-section-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--color-text-primary);
            flex: 1;
        }

        .pp-chevron {
            font-size: 16px;
            color: var(--color-text-muted);
            transition: transform 0.25s ease;
        }

        .pp-chevron.open {
            transform: rotate(180deg);
        }

        .pp-section-body {
            display: none;
            padding: 0 1.25rem 1.25rem;
            border-top: 0.5px solid var(--color-border);
        }

        .pp-section-body.open {
            display: block;
        }

        .pp-section-body p {
            font-size: 14px;
            line-height: 1.75;
            color: var(--color-text-secondary);
            margin-top: 0.75rem;
        }

        .pp-section-body ul {
            margin: 0.75rem 0 0;
            padding: 0;
            list-style: none;
        }

        .pp-section-body ul li {
            font-size: 14px;
            line-height: 1.65;
            color: var(--color-text-secondary);
            padding: 6px 0 6px 22px;
            position: relative;
            border-bottom: 0.5px solid var(--color-border);
        }

        .pp-section-body ul li:last-child {
            border-bottom: none;
        }

        .pp-section-body ul li::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 15px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--color-brand);
        }

        .pp-section-body a {
            color: var(--color-brand);
            text-decoration: none;
        }

        .pp-section-body a:hover {
            text-decoration: underline;
        }

        .pp-highlight {
            background: var(--color-brand-light);
            border-left: 3px solid var(--color-brand);
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            padding: 0.75rem 1rem;
            margin-top: 0.75rem;
            font-size: 13px;
            color: var(--color-brand-text);
            line-height: 1.65;
        }

        .pp-highlight a {
            color: var(--color-brand) !important;
        }

        /* Footer */
        .pp-footer {
            text-align: center;
            padding: 2rem 1rem 1rem;
            font-size: 12px;
            color: var(--color-text-muted);
        }

        .pp-footer a {
            color: var(--color-brand);
            text-decoration: none;
        }

        .pp-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 520px) {
            .pp-toc-grid {
                grid-template-columns: 1fr;
            }

            .pp-hero-title {
                font-size: 30px;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="pp-hero">
            <div class="pp-hero-label">Legal · Privacy</div>
            <div class="pp-hero-title">Privacy Policy for<br><em>RupeeFlow</em></div>
            <div class="pp-hero-date">Effective date: 31 May 2026</div>
            <a href="mailto:kandulakruthish@gmail.com" class="pp-hero-contact">
                <i class="ti ti-mail"></i> kandulakruthish@gmail.com
            </a>
        </div>

        <div class="pp-toc">
            <div class="pp-toc-heading">Contents</div>
            <div class="pp-toc-grid" id="toc"></div>
        </div>

        <div id="sections"></div>

    </div>

    <script>
        const sections = [
            {
                id: "collection",
                icon: "ti-database",
                title: "Information collection and use",
                content: `<p>The Application collects information when you download and use it. This may include:</p>
        <ul>
          <li>Your device's Internet Protocol (IP) address</li>
          <li>Pages visited within the Application, visit time and date, time spent on pages</li>
          <li>Total time spent on the Application</li>
          <li>Your mobile operating system</li>
        </ul>
        <p>For a better experience, the Service Provider may request certain personally identifiable information. This information will be retained and used as described in this policy.</p>`
            },
            {
                id: "cookies",
                icon: "ti-cookie",
                title: "Cookies and tracking technologies",
                content: `<p>The Application or its third-party SDKs may use cookies, SDKs, pixels, and similar technologies to support functionality, analytics, or service delivery.</p>
        <div class="pp-highlight">Where required by applicable law, the Service Provider will obtain consent before using non-essential tracking technologies.</div>`
            },
            {
                id: "rights",
                icon: "ti-shield-check",
                title: "Your rights",
                content: `<p>You may request access to, correction of, or deletion of your personal data held by the Service Provider.</p>
        <p>To exercise these rights, or to withdraw consent where processing is based on consent, contact: <a href="mailto:kandulakruthish@gmail.com">kandulakruthish@gmail.com</a></p>`
            },
            {
                id: "ccpa",
                icon: "ti-map-pin",
                title: "California privacy rights (CCPA/CPRA)",
                content: `<p>If you are a California resident, you have the following rights:</p>
        <ul>
          <li>Right to know what personal information is collected</li>
          <li>Right to delete personal information</li>
          <li>Right to opt out of the sale or sharing of personal information</li>
          <li>Right to non-discrimination for exercising these rights</li>
        </ul>
        <p>To exercise your CCPA/CPRA rights, contact: <a href="mailto:kandulakruthish@gmail.com">kandulakruthish@gmail.com</a></p>`
            },
            {
                id: "third-party",
                icon: "ti-share",
                title: "Third party access",
                content: `<p>Only aggregated, anonymized data is periodically transmitted to external services to aid in improving the Application.</p>
        <p>The Application utilizes third-party services that have their own privacy policies:</p>
        <ul>
          <li><a href="https://www.google.com/policies/privacy/" target="_blank" rel="noopener noreferrer">Google Play Services</a></li>
          <li><a href="https://firebase.google.com/support/privacy" target="_blank" rel="noopener noreferrer">Google Analytics for Firebase</a></li>
          <li><a href="https://firebase.google.com/support/privacy/" target="_blank" rel="noopener noreferrer">Firebase Crashlytics</a></li>
        </ul>`
            },
            {
                id: "international",
                icon: "ti-world",
                title: "International data transfers",
                content: `<p>The Service Provider or its third-party service providers may transfer personal data to countries outside your country of residence, including outside the EEA.</p>
        <p>Where applicable law requires safeguards, the Service Provider will use:</p>
        <ul>
          <li>Standard Contractual Clauses (SCCs) approved by the European Commission</li>
          <li>Adequacy decisions or other legally recognized transfer mechanisms</li>
          <li>Your consent, where required and legally permitted</li>
        </ul>`
            },
            {
                id: "disclosure",
                icon: "ti-eye",
                title: "Disclosure of information",
                content: `<p>The Service Provider may disclose your information:</p>
        <ul>
          <li>As required by law, such as to comply with a subpoena or similar legal process</li>
          <li>When necessary to protect rights, safety, investigate fraud, or respond to government requests</li>
          <li>With trusted service providers working on their behalf, bound by this privacy statement</li>
        </ul>`
            },
            {
                id: "opt-out",
                icon: "ti-logout",
                title: "Opt-out rights",
                content: `<p>You can stop further collection of information by uninstalling the Application. Uninstalling stops data collection from your device, but does not automatically delete information already transmitted to the Service Provider or third parties.</p>
        <p>To request deletion, contact: <a href="mailto:kandulakruthish@gmail.com">kandulakruthish@gmail.com</a></p>`
            },
            {
                id: "retention",
                icon: "ti-clock",
                title: "Data retention policy",
                content: `<p>Retention periods by data type:</p>
        <ul>
          <li><strong>User provided data:</strong> Duration of use + 12 months, unless longer retention required by law</li>
          <li><strong>Automatically collected data:</strong> Up to 24 months from collection</li>
          <li><strong>Aggregated/anonymized data:</strong> Retained indefinitely (no longer identifies you)</li>
          <li><strong>Legal compliance data:</strong> As long as required by applicable law</li>
        </ul>`
            },
            {
                id: "children",
                icon: "ti-user-x",
                title: "Children",
                content: `<p>The Application is not intended for children under 16 years of age. The Service Provider does not knowingly solicit data from or market to children.</p>
        <div class="pp-highlight">If you are a parent or guardian and believe your child has provided personal information, contact <a href="mailto:kandulakruthish@gmail.com">kandulakruthish@gmail.com</a> immediately.</div>`
            },
            {
                id: "security",
                icon: "ti-lock",
                title: "Security",
                content: `<p>The Service Provider provides physical, electronic, and procedural safeguards to protect the information it processes and maintains.</p>
        <p>In the event of a data breach affecting your personal data, the Service Provider will notify you in accordance with applicable legal requirements.</p>`
            },
            {
                id: "changes",
                icon: "ti-refresh",
                title: "Changes to this policy",
                content: `<p>The Service Provider may update this Privacy Policy from time to time. Material changes will be communicated by posting the updated policy with an effective date.</p>
        <p>Previous versions are available upon request at <a href="mailto:kandulakruthish@gmail.com">kandulakruthish@gmail.com</a>.</p>`
            },
            {
                id: "consent",
                icon: "ti-check",
                title: "Your consent",
                content: `<p>Where processing is based on consent, you provide that consent by affirmatively opting in to the relevant feature or action.</p>
        <p>You may withdraw consent at any time without affecting processing carried out before.</p>`
            }
        ];

        const tocEl = document.getElementById('toc');
        const sectionsEl = document.getElementById('sections');

        sections.forEach((s) => {
            const tocItem = document.createElement('a');
            tocItem.className = 'pp-toc-item';
            tocItem.href = '#sec-' + s.id;
            tocItem.innerHTML = `<span class="pp-toc-dot"></span>${s.title}`;
            tocItem.addEventListener('click', (e) => {
                e.preventDefault();
                const body = document.getElementById('body-' + s.id);
                const chevron = document.getElementById('chev-' + s.id);
                if (body && !body.classList.contains('open')) {
                    body.classList.add('open');
                    chevron.classList.add('open');
                }
                document.getElementById('sec-' + s.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
            tocEl.appendChild(tocItem);

            const sec = document.createElement('div');
            sec.className = 'pp-section';
            sec.id = 'sec-' + s.id;
            sec.innerHTML = `
        <div class="pp-section-header" onclick="toggleSection('${s.id}')">
          <div class="pp-icon"><i class="ti ${s.icon}"></i></div>
          <span class="pp-section-title">${s.title}</span>
          <i class="ti ti-chevron-down pp-chevron" id="chev-${s.id}"></i>
        </div>
        <div class="pp-section-body" id="body-${s.id}">
          ${s.content}
        </div>
      `;
            sectionsEl.appendChild(sec);
        });

        function toggleSection(id) {
            const body = document.getElementById('body-' + id);
            const chev = document.getElementById('chev-' + id);
            body.classList.toggle('open');
            chev.classList.toggle('open');
        }

        document.getElementById('body-collection').classList.add('open');
        document.getElementById('chev-collection').classList.add('open');
    </script>
</body>

</html>
