<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy - RupeeFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --color-bg: #f5f4f0;
            --color-surface: #ffffff;
            --color-surface-2: #f9f8f5;
            --color-border: rgba(0, 0, 0, 0.1);
            --color-border-hover: rgba(0, 0, 0, 0.18);
            --color-text-primary: #1a1a18;
            --color-text-secondary: #5a5956;
            --color-text-muted: #9a9894;
            --color-brand: #f4bb5a;
            --color-brand-light: #fff5e6;
            --color-brand-text: #7a4d00;
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-bg: #1a1a18;
                --color-surface: #242422;
                --color-surface-2: #2c2c2a;
                --color-border: rgba(255, 255, 255, 0.1);
                --color-border-hover: rgba(255, 255, 255, 0.18);
                --color-text-primary: #f0efe8;
                --color-text-secondary: #a8a5a0;
                --color-text-muted: #6a6864;
                --color-brand-light: #2a1f00;
                --color-brand-text: #f4bb5a;
            }
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--color-bg);
            color: var(--color-text-primary);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
        }

        /* Hero */
        .pp-hero {
            background: #f4bb5a;
            padding: 2.5rem 2rem 3rem;
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-lg);
            margin-bottom: 1.5rem;
        }

        .pp-hero::before {
            content: '';
            position: absolute;
            right: -40px;
            top: -40px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
        }

        .pp-hero::after {
            content: '';
            position: absolute;
            right: 50px;
            bottom: -70px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
        }

        .pp-hero-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: 0.5rem;
        }

        .pp-hero-title {
            font-family: 'Fraunces', serif;
            font-size: 38px;
            font-weight: 300;
            color: #fff;
            margin: 0 0 0.5rem;
            line-height: 1.15;
        }

        .pp-hero-title em {
            font-style: italic;
        }

        .pp-hero-date {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 1rem;
        }

        .pp-hero-contact {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 0.75rem;
            font-size: 13px;
            color: #fff;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 16px;
            border-radius: 100px;
            text-decoration: none;
            transition: background 0.15s;
        }

        .pp-hero-contact:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* TOC */
        .pp-toc {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            border: 0.5px solid var(--color-border);
        }

        .pp-toc-heading {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-text-muted);
            margin-bottom: 0.75rem;
        }

        .pp-toc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 16px;
        }

        .pp-toc-item {
            font-size: 13px;
            color: var(--color-brand);
            cursor: pointer;
            padding: 4px 0;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .pp-toc-item:hover {
            text-decoration: underline;
        }

        .pp-toc-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--color-brand);
            flex-shrink: 0;
        }

        /* Accordion */
        .pp-section {
            border: 0.5px solid var(--color-border);
            border-radius: var(--radius-lg);
            margin-bottom: 0.75rem;
            overflow: hidden;
            background: var(--color-surface);
            transition: border-color 0.15s;
        }

        .pp-section:hover {
            border-color: var(--color-border-hover);
        }

        .pp-section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 1rem 1.25rem;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }

        .pp-section-header:hover {
            background: var(--color-surface-2);
        }

        .pp-icon {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-md);
            background: var(--color-brand-light);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .pp-icon i {
            font-size: 17px;
            color: var(--color-brand);
        }

        .pp-section-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--color-text-primary);
            flex: 1;
        }

        .pp-chevron {
            font-size: 16px;
            color: var(--color-text-muted);
            transition: transform 0.25s ease;
        }

        .pp-chevron.open {
            transform: rotate(180deg);
        }

        .pp-section-body {
            display: none;
            padding: 0 1.25rem 1.25rem;
            border-top: 0.5px solid var(--color-border);
        }

        .pp-section-body.open {
            display: block;
        }

        .pp-section-body p {
            font-size: 14px;
            line-height: 1.75;
            color: var(--color-text-secondary);
            margin-top: 0.75rem;
        }

        .pp-section-body ul {
            margin: 0.75rem 0 0;
            padding: 0;
            list-style: none;
        }

        .pp-section-body ul li {
            font-size: 14px;
            line-height: 1.65;
            color: var(--color-text-secondary);
            padding: 6px 0 6px 22px;
            position: relative;
            border-bottom: 0.5px solid var(--color-border);
        }

        .pp-section-body ul li:last-child {
            border-bottom: none;
        }

        .pp-section-body ul li::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 15px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--color-brand);
        }

        .pp-section-body a {
            color: var(--color-brand);
            text-decoration: none;
        }

        .pp-section-body a:hover {
            text-decoration: underline;
        }

        .pp-highlight {
            background: var(--color-brand-light);
            border-left: 3px solid var(--color-brand);
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            padding: 0.75rem 1rem;
            margin-top: 0.75rem;
            font-size: 13px;
            color: var(--color-brand-text);
            line-height: 1.65;
        }

        .pp-highlight a {
            color: var(--color-brand) !important;
        }

        /* Footer */
        .pp-footer {
            text-align: center;
            padding: 2rem 1rem 1rem;
            font-size: 12px;
            color: var(--color-text-muted);
        }

        .pp-footer a {
            color: var(--color-brand);
            text-decoration: none;
        }

        .pp-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 520px) {
            .pp-toc-grid {
                grid-template-columns: 1fr;
            }

            .pp-hero-title {
                font-size: 30px;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="pp-hero">
            <div class="pp-hero-label">Legal · Privacy</div>
            <div class="pp-hero-title">Privacy Policy for<br><em>RupeeFlow</em></div>
            <div class="pp-hero-date">Effective date: 1 June 2026</div>
            <a href="mailto:kandulakruthish@gmail.com" class="pp-hero-contact">
                <i class="ti ti-mail"></i> kandulakruthish@gmail.com
            </a>
        </div>

        <div class="pp-toc">
            <div class="pp-toc-heading">Contents</div>
            <div class="pp-toc-grid" id="toc"></div>
        </div>

        <div id="sections"></div>

    </div>

    <script>

        const sections = [
            {
                id: "about",
                icon: "ti-info-circle",
                title: "About RupeeFlow",
                content: `
    <p>RupeeFlow is a personal expense tracking and budgeting application developed by KC Development Works.</p>

    <div class="pp-highlight">
        RupeeFlow is an expense tracking and budgeting application for personal record keeping.
        It does not provide banking services, loans, investments, money transfers,
        credit products, or financial advice.
    </div>
    `
            },

            {
                id: "collection",
                icon: "ti-database",
                title: "Information We Collect",
                content: `
    <p>To provide app functionality, we may collect information that you choose to provide:</p>

    <ul>
        <li>Name</li>
        <li>Email address</li>
        <li>Income records entered by you</li>
        <li>Expense records entered by you</li>
        <li>Budget information</li>
        <li>Savings goals</li>
        <li>Categories and transaction notes</li>
    </ul>

    <p>We may also collect technical information such as app version, device type, operating system version, crash reports, and diagnostic information.</p>
    `
            },

            {
                id: "usage",
                icon: "ti-settings",
                title: "How We Use Information",
                content: `
    <p>The information collected is used to:</p>

    <ul>
        <li>Create and manage your account</li>
        <li>Store and synchronize your records</li>
        <li>Provide app features and functionality</li>
        <li>Improve performance and reliability</li>
        <li>Fix bugs and technical issues</li>
        <li>Respond to support requests</li>
    </ul>

    <p>We do not sell, rent, or trade personal information.</p>
    `
            },

            {
                id: "thirdparty",
                icon: "ti-cloud",
                title: "Third-Party Services",
                content: `
    <p>RupeeFlow may use trusted third-party services that help operate and improve the app.</p>

    <ul>
        <li>Firebase Authentication</li>
        <li>Firebase Analytics</li>
        <li>Firebase Crashlytics</li>
        <li>Google Play Services</li>
    </ul>

    <p>These providers process information according to their own privacy policies.</p>
    `
            },

            {
                id: "security",
                icon: "ti-lock",
                title: "Security",
                content: `
    <p>We use reasonable technical and organizational measures to help protect user information.</p>

    <p>However, no method of electronic transmission or storage can be guaranteed to be completely secure.</p>
    `
            },

            {
                id: "retention",
                icon: "ti-clock",
                title: "Data Retention",
                content: `
    <p>Information is retained only for as long as necessary to provide services, maintain accounts, comply with legal obligations, and resolve disputes.</p>

    <p>Data that is no longer required may be deleted or anonymized.</p>
    `
            },

            {
                id: "deletion",
                icon: "ti-trash",
                title: "Account and Data Deletion",
                content: `
    <p>You may request deletion of your account and associated data at any time.</p>

    <div class="pp-highlight">
        Contact us at:
        <br>
        <a href="mailto:kandulakruthish@gmail.com">
            kandulakruthish@gmail.com
        </a>
    </div>
    `
            },

            {
                id: "rights",
                icon: "ti-shield-check",
                title: "Your Rights",
                content: `
    <p>Depending on your location and applicable laws, you may have the right to:</p>

    <ul>
        <li>Access your personal information</li>
        <li>Correct inaccurate information</li>
        <li>Request deletion of information</li>
        <li>Withdraw consent where applicable</li>
    </ul>

    <p>To exercise these rights, contact us using the email address below.</p>
    `
            },

            {
                id: "children",
                icon: "ti-user-off",
                title: "Children's Privacy",
                content: `
    <p>RupeeFlow is not intended for children under 13 years of age.</p>

    <p>We do not knowingly collect personal information from children.</p>
    `
            },

            {
                id: "changes",
                icon: "ti-refresh",
                title: "Policy Updates",
                content: `
    <p>We may update this Privacy Policy from time to time.</p>

    <p>Updated versions will be published on this page together with a revised effective date.</p>
    `
            },

            {
                id: "contact",
                icon: "ti-mail",
                title: "Contact Us",
                content: `
    <p>If you have any questions regarding this Privacy Policy, please contact:</p>

    <div class="pp-highlight">
        KC Development Works
        <br><br>
        Email:
        <a href="mailto:kandulakruthish@gmail.com">
            kandulakruthish@gmail.com
        </a>
    </div>
    `
            }
        ];

        const tocEl = document.getElementById('toc');
        const sectionsEl = document.getElementById('sections');

        sections.forEach((s) => {
            const tocItem = document.createElement('a');
            tocItem.className = 'pp-toc-item';
            tocItem.href = '#sec-' + s.id;
            tocItem.innerHTML = `<span class="pp-toc-dot"></span>${s.title}`;
            tocItem.addEventListener('click', (e) => {
                e.preventDefault();
                const body = document.getElementById('body-' + s.id);
                const chevron = document.getElementById('chev-' + s.id);
                if (body && !body.classList.contains('open')) {
                    body.classList.add('open');
                    chevron.classList.add('open');
                }
                document.getElementById('sec-' + s.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
            tocEl.appendChild(tocItem);

            const sec = document.createElement('div');
            sec.className = 'pp-section';
            sec.id = 'sec-' + s.id;
            sec.innerHTML = `
        <div class="pp-section-header" onclick="toggleSection('${s.id}')">
          <div class="pp-icon"><i class="ti ${s.icon}"></i></div>
          <span class="pp-section-title">${s.title}</span>
          <i class="ti ti-chevron-down pp-chevron" id="chev-${s.id}"></i>
        </div>
        <div class="pp-section-body" id="body-${s.id}">
          ${s.content}
        </div>
      `;
            sectionsEl.appendChild(sec);
        });

        function toggleSection(id) {
            const body = document.getElementById('body-' + id);
            const chev = document.getElementById('chev-' + id);
            body.classList.toggle('open');
            chev.classList.toggle('open');
        }

        document.getElementById('body-collection').classList.add('open');
        document.getElementById('chev-collection').classList.add('open');
    </script>
</body>

</html>
